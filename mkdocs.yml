site_name: Soumya Shreeram
site_description: Astrophysicist | Research software developer
site_author: Soumya Shreeram
site_url: https://soumyashreeram.github.io/soumya_shreeram.github.io/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
  font:
    text: Roboto
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - TNG Lightcone: lightcone.md
  - Publications: publications.md
  - Data & Software: data.md

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search